<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; text-align: center;}
        #reader { width: 100%; height: 100%; position: absolute; top:0; left:0; }
        #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
        #message { position: relative; z-index: 10; display: none; background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 10px; font-size: 16px; font-weight: bold; width: 80%; }
    </style>
</head>
<body>
    <div id="message">Memproses...</div>
    <div id="reader"></div>
    <script>
        const html5QrCode = new Html5Qrcode("reader");
        
        // REVISI IPHONE: Hapus aspectRatio agar kamera iPhone tidak freeze
        // Fokuskan engine hanya untuk membaca QR_CODE agar lebih ringan dan cepat
        const config = { 
            fps: 10, 
            qrbox: { width: 250, height: 250 },
            formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ]
        };
        
        let isScanned = false; 

        // Fungsi paksaan khusus iOS agar video stream tidak diblokir
        const forceIOSVideoPlay = () => {
            const videos = document.querySelectorAll('video');
            videos.forEach(vid => {
                vid.setAttribute('playsinline', 'true');
                vid.setAttribute('webkit-playsinline', 'true');
                vid.setAttribute('muted', 'true');
                vid.muted = true;
            });
        };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                if (isScanned) return; 
                isScanned = true;

                const msgEl = document.getElementById('message');
                msgEl.style.display = 'block';
                msgEl.innerText = "✅ QR Terbaca! Kembali ke form...";

                if (window.opener) {
                    window.opener.postMessage({ type: "QR_SCANNED", data: decodedText }, "*");
                }

                setTimeout(() => {
                    html5QrCode.stop().then(() => {
                        window.close(); 
                    }).catch(err => console.log(err));
                }, 500);
            },
            (error) => { 
                // Selama proses scanning (mencari QR), pastikan iPhone tidak menghentikan video
                forceIOSVideoPlay(); 
            }
        ).catch((err) => {
            alert("Gagal mengakses kamera. Jika pakai iPhone, klik ikon Safari/Browser di pojok layar.");
        });
    </script>
</body>
</html>
