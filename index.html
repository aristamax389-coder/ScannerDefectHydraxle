<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; text-align: center;}
        #reader { width: 100%; height: 100%; position: absolute; top:0; left:0; }
        #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
        #message { position: relative; z-index: 10; display: none; background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 10px; font-size: 16px; font-weight: bold; width: 80%; }
    </style>
</head>
<body>
    <div id="message">Memproses...</div>
    <div id="reader"></div>
    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const config = { 
            fps: 10, 
            qrbox: function(vw, vh) {
                let minEdge = Math.min(vw, vh);
                return { width: Math.floor(minEdge * 0.7), height: Math.floor(minEdge * 0.7) };
            }
        };
        
        let isScanned = false; 

        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                if (isScanned) return; 
                isScanned = true;

                html5QrCode.stop().then(() => {
                    document.getElementById('reader').style.display = 'none';
                    const msgEl = document.getElementById('message');
                    msgEl.style.display = 'block';
                    msgEl.innerText = "✅ QR Terbaca! Kembali ke Dashboard...";

                    // MENGAMBIL URL DASHBOARD LALU PINDAH KEMBALI
                    const urlParams = new URLSearchParams(window.location.search);
                    const returnUrl = urlParams.get('returnUrl');

                    if (returnUrl) {
                        let separator = returnUrl.includes('?') ? '&' : '?';
                        // Pindah kembali ke Apps Script dengan membawa data QR Code
                        window.location.href = returnUrl + separator + "qr=" + encodeURIComponent(decodedText);
                    } else {
                        msgEl.innerText = "Error: Buka scanner dari Dashboard utama.";
                    }
                }).catch(err => console.log(err));
            },
            (error) => {}
        ).catch((err) => {
            alert("Gagal mengakses kamera. Pastikan memberikan izin kamera.");
        });
    </script>
</body>
</html>
