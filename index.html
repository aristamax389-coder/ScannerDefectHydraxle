<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #reader { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="reader"></div>
    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 15, qrbox: 250, aspectRatio: 1.0 };

        function start() {
            html5QrCode.start({ facingMode: "environment" }, config, 
                (text) => {
                    window.parent.postMessage({ type: "QR_SCANNED", data: text }, "*");
                }
            ).then(() => {
                window.parent.postMessage({ type: "CAMERA_READY" }, "*");
            }).catch(err => {
                window.parent.postMessage({ type: "CAMERA_ERROR", data: err }, "*");
            });
        }
        // Jalankan saat load
        window.onload = start;
    </script>
</body>
</html>
