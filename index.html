<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; text-align: center;}
        #reader { width: 100%; height: 100%; position: absolute; top:0; left:0; }
        #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
        #message { position: relative; z-index: 10; display: none; background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 10px; font-size: 16px; font-weight: bold; width: 80%; }
    </style>
</head>
<body>
    <div id="message">Memproses...</div>
    <div id="reader"></div>
    <script>
        const html5QrCode = new Html5Qrcode("reader");
        
        // Hapus qrbox agar membaca FULL SCREEN (Solusi ampuh untuk PC & berbagai browser)
        const config = { fps: 10 };
        let isScanned = false; 

        // Fungsi anti-freeze khusus iOS
        const forceIOSVideoPlay = () => {
            const videos = document.querySelectorAll('video');
            videos.forEach(vid => {
                vid.setAttribute('playsinline', 'true');
                vid.setAttribute('webkit-playsinline', 'true');
                vid.setAttribute('muted', 'true');
                vid.muted = true;
            });
        };

        // Menggunakan "ideal: environment". 
        // Otomatis kamera belakang di HP, dan otomatis kamera depan di Laptop.
        html5QrCode.start(
            { facingMode: { ideal: "environment" } }, 
            config, 
            (decodedText) => {
                if (isScanned) return; 
                isScanned = true;

                const msgEl = document.getElementById('message');
                msgEl.style.display = 'block';
                msgEl.innerText = "✅ QR Terbaca! Kembali ke form...";

                if (window.opener) {
                    window.opener.postMessage({ type: "QR_SCANNED", data: decodedText }, "*");
                }

                setTimeout(() => {
                    html5QrCode.stop().then(() => {
                        window.close(); 
                    }).catch(err => console.log(err));
                }, 500);
            },
            (error) => { forceIOSVideoPlay(); }
        ).catch((err) => {
            alert("Gagal mengakses kamera. Pastikan browser memiliki izin kamera.");
        });
    </script>
</body>
</html>
