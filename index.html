<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; text-align: center;}
        #reader { width: 100%; height: 100%; position: absolute; top:0; left:0; }
        #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
        #message { position: relative; z-index: 10; display: none; background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 10px; font-size: 16px; font-weight: bold; width: 80%; }
    </style>
</head>
<body>
    <div id="message">Memproses...</div>
    <div id="reader"></div>
    <script>
        const html5QrCode = new Html5Qrcode("reader");
        
        // KUNCI 1: Kembalikan config sederhana seperti Kode 1. Tanpa batasan format aneh-aneh.
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };
        let isScanned = false; 

        // Fungsi utama
        const jalankanScanner = (modeKamera) => {
            html5QrCode.start(
                modeKamera, 
                config,
                (decodedText) => {
                    if (isScanned) return; 
                    isScanned = true;

                    const msgEl = document.getElementById('message');
                    msgEl.style.display = 'block';
                    msgEl.innerText = "✅ QR Terbaca! Sedang memproses...";

                    if (window.opener) {
                        window.opener.postMessage({ type: "QR_SCANNED", data: decodedText }, "*");
                    }

                    // KUNCI 2: Ambil trik Jeda Waktu dari Kode 2 agar iPhone tidak nyangkut
                    setTimeout(() => {
                        html5QrCode.stop().then(() => {
                            window.close(); 
                        }).catch(err => console.log(err));
                    }, 500);
                },
                (error) => {
                    // KUNCI 3: DIBIARKAN KOSONG SEPERTI KODE 1.
                    // Ini yang akan menyelamatkan PC dan HP Android dari "Kamera Buta / Lag".
                }
            ).then(() => {
                // KUNCI 4: Hack iOS dilakukan HANYA 1 KALI saat kamera menyala. Bukan 10x sedetik.
                const videoEl = document.querySelector("#reader video");
                if(videoEl) {
                    videoEl.setAttribute("playsinline", "true");
                    videoEl.setAttribute("webkit-playsinline", "true");
                }
            }).catch((err) => {
                // KUNCI 5: Jika PC menolak 'environment', otomatis coba 'user' (webcam)
                if (modeKamera.facingMode === "environment") {
                    console.log("Beralih ke webcam...");
                    jalankanScanner({ facingMode: "user" });
                } else {
                    alert("Gagal mengakses kamera. Pastikan izin kamera diberikan.");
                }
            });
        };

        // Eksekusi pertama: Selalu minta kamera belakang (Tembus di HP)
        jalankanScanner({ facingMode: "environment" });

    </script>
</body>
</html>
