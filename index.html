<!DOCTYPE html>

    /* CSS BARU UNTUK ESTETIKA MODAL/POP-UP */
    :root { --primary-color: #2a52be; --accent-orange: #ff8c00; --accent-red: #e74c3c; --success-green: #2ecc71; --bg-light: #fdf5e6; }
    body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--bg-light); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; box-sizing: border-box; }
    .card { background: white; padding: 40px 30px; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; border: 1px solid #f0f0f0; transition: all 0.3s ease; }
    .company-name { color: var(--accent-red); font-weight: bold; font-size: 14px; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
    .title { font-size: 24px; font-weight: 800; color: #333; margin-bottom: 5px; }
    .subtitle { font-size: 13px; color: #888; margin-bottom: 30px; }
    .btn-scan { background: linear-gradient(135deg, var(--accent-orange) 0%, #ff4500 100%); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 15px; margin-bottom: 25px; box-shadow: 0 5px 15px rgba(255,69,0,0.25); transition: transform 0.2s, box-shadow 0.2s; }
    .btn-scan:active { transform: scale(0.98); box-shadow: 0 2px 5px rgba(255,69,0,0.15); }
    .status-container { text-align: left; }
    .box { padding: 15px; border-radius: 10px; margin-bottom: 12px; border-left: 5px solid; transition: all 0.3s ease; }
    .box-status { background: #fff5f5; border-left-color: var(--accent-red); }
    .box-qr { background: #f0fdf4; border-left-color: var(--success-green); }
    .label { font-size: 11px; font-weight: bold; margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: 0.5px; }
    .content { font-size: 14px; color: #444; font-weight: 500; word-wrap: break-word;}
    
    /* STRUKTUR MODAL/POP-UP */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
    .modal-content { display: none; position: relative; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); width: 90%; max-width: 380px; text-align: center; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #f0f0f0; padding-bottom: 15px; }
    .modal-title { font-size: 18px; font-weight: 700; color: #333; margin: 0; }
    .close-modal { background: none; border: none; font-size: 24px; font-weight: 300; color: #888; cursor: pointer; line-height: 1; padding: 0; }
    .close-modal:hover { color: var(--accent-red); }
    #reader { width: 100%; border-radius: 12px; margin-bottom: 20px; overflow: hidden; background: #000; border: 3px solid var(--primary-color); box-sizing: border-box;}
    #status-scan-modal { font-size: 13px; color: #777; font-weight: 500;}
  </style>
</head>
