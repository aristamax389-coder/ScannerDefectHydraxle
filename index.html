<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; text-align: center;}
        #reader { width: 100%; height: 100%; position: absolute; top:0; left:0; }
        #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
        #message { position: relative; z-index: 10; display: none; background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 10px; font-size: 16px; font-weight: bold; width: 80%; }
    </style>
</head>
<body>
    <div id="message">Membuka kamera...</div>
    <div id="reader"></div>
    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };
        let isScanned = false; 

        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                // Mencegah scan berkali-kali
                if (isScanned) return; 
                isScanned = true;

                // 1. BUKTIKAN BAHWA KAMERA BISA BACA QR
                alert("✅ BERHASIL BACA QR:\n" + decodedText);

                const msgEl = document.getElementById('message');
                msgEl.style.display = 'block';
                msgEl.innerText = "QR Terbaca! Mengirim ke sistem...";

                // 2. CEK APAKAH APPLE MEMBLOKIR KONEKSI KE DASHBOARD
                if (window.opener) {
                    try {
                        window.opener.postMessage({ type: "QR_SCANNED", data: decodedText }, "*");
                        alert("✅ Data terkirim ke Dashboard. Menutup scanner...");
                    } catch (e) {
                        alert("❌ GAGAL KIRIM DATA:\nApple memblokir pengiriman data antar tab.");
                    }
                } else {
                    alert("❌ KONEKSI TERPUTUS:\nTab Dashboard (Google) tidak terdeteksi oleh tab Scanner (GitHub).");
                }

                setTimeout(() => {
                    html5QrCode.stop().then(() => {
                        document.getElementById('reader').style.display = 'none';
                        window.close(); 
                    }).catch(err => console.log(err));
                }, 1000);
            },
            (error) => { /* Abaikan error loop frame */ }
        ).catch((err) => {
            alert("❌ GAGAL AKSES KAMERA:\nPastikan izin kamera diberikan dan buka lewat browser Safari langsung.");
        });
    </script>
</body>
</html>
