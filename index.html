<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; text-align: center;}
        #reader { width: 100%; height: 100%; position: absolute; top:0; left:0; }
        #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
        #message { position: relative; z-index: 10; display: none; background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 10px; font-size: 16px; font-weight: bold; width: 80%; }
    </style>
</head>
<body>
    <div id="message">Memproses...</div>
    <div id="reader"></div>
    <script>
        const html5QrCode = new Html5Qrcode("reader");
        let isScanned = false; 

        // 1. SISTEM DETEKSI PERANGKAT PINTAR
        // Cek apakah perangkat yang membuka web ini adalah perangkat iOS (iPhone/iPad/iPod)
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

        // 2. CONFIG DINAMIS (BUNGLON)
        let config = { fps: 10, qrbox: { width: 250, height: 250 } };
        
        // Jika BUKAN iPhone (Artinya Android atau PC), pasang aspectRatio: 1.0 seperti Kode 1
        if (!isIOS) {
            config.aspectRatio = 1.0; 
        }

        // 3. EKSEKUSI KAMERA (Menggunakan facingMode Code 1 yang terbukti sukses)
        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                if (isScanned) return; 
                isScanned = true;

                const msgEl = document.getElementById('message');
                msgEl.style.display = 'block';
                msgEl.innerText = "✅ QR Terbaca! Sedang memproses...";

                // Kirim data ke Google Apps Script
                if (window.opener) {
                    window.opener.postMessage({ type: "QR_SCANNED", data: decodedText }, "*");
                }

                // Trik Jeda Waktu dari Code 2 (Penting agar iPhone WA tidak terputus)
                setTimeout(() => {
                    html5QrCode.stop().then(() => {
                        window.close(); 
                    }).catch(err => console.log(err));
                }, 500);
            },
            (error) => {
                // Dibiarkan kosong agar PC dan Android tidak lag/buta (seperti Kode 1)
            }
        ).then(() => {
            // 4. HACK VIDEO KHUSUS iPHONE
            if (isIOS) {
                const videoEl = document.querySelector("#reader video");
                if(videoEl) {
                    videoEl.setAttribute("playsinline", "true");
                    videoEl.setAttribute("webkit-playsinline", "true");
                }
            }
        }).catch((err) => {
            alert("Gagal mengakses kamera. Pastikan browser memiliki izin kamera.");
        });
    </script>
</body>
</html>
