<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; text-align: center;}
        #reader { width: 100%; height: 100%; position: absolute; top:0; left:0; }
        #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
        #message { position: relative; z-index: 10; display: none; background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 10px; font-size: 16px; font-weight: bold; width: 80%; }
    </style>
</head>
<body>
    <div id="message">Memproses...</div>
    <div id="reader"></div>
    <script>
        const html5QrCode = new Html5Qrcode("reader");
        
        // REVISI: Hapus format spesifik dan qrbox. 
        // Membiarkan config kosong akan membuat mesin membaca FULL SCREEN.
        // Ini adalah kunci agar Laptop/PC bisa kembali membaca QR.
        const config = { 
            fps: 15
        };
        
        let isScanned = false; 

        // Fungsi anti-freeze untuk iOS
        const forceIOSVideoPlay = () => {
            const videos = document.querySelectorAll('video');
            videos.forEach(vid => {
                vid.setAttribute('playsinline', 'true');
                vid.setAttribute('webkit-playsinline', 'true');
                vid.setAttribute('muted', 'true');
                vid.muted = true;
            });
        };

        const startScan = (cameraParams) => {
            html5QrCode.start(
                cameraParams, 
                config,
                (decodedText) => {
                    if (isScanned) return; 
                    isScanned = true;

                    const msgEl = document.getElementById('message');
                    msgEl.style.display = 'block';
                    msgEl.innerText = "✅ QR Terbaca! Kembali ke form...";

                    if (window.opener) {
                        window.opener.postMessage({ type: "QR_SCANNED", data: decodedText }, "*");
                    }

                    setTimeout(() => {
                        html5QrCode.stop().then(() => {
                            window.close(); 
                        }).catch(err => console.log(err));
                    }, 500);
                },
                (error) => { 
                    forceIOSVideoPlay(); 
                }
            ).catch((err) => {
                console.log("Error kamera:", err);
                alert("Kamera gagal diakses.");
            });
        };

        // Deteksi Kamera Cerdas
        Html5Qrcode.getCameras().then(devices => {
            if (devices && devices.length > 0) {
                let selectedCameraId = devices[0].id; 
                for (let i = 0; i < devices.length; i++) {
                    let label = devices[i].label.toLowerCase();
                    if (label.includes("back") || label.includes("environment") || label.includes("belakang")) {
                        selectedCameraId = devices[i].id;
                        break;
                    }
                }
                startScan(selectedCameraId);
            } else {
                startScan({ facingMode: { ideal: "environment" } });
            }
        }).catch(err => {
            startScan({ facingMode: { ideal: "environment" } });
        });
    </script>
</body>
</html>
