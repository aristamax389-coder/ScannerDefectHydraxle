<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; text-align: center;}
        #reader { width: 100%; height: 100%; position: absolute; top:0; left:0; }
        #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
        #message { position: relative; z-index: 10; display: none; background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 10px; font-size: 16px; font-weight: bold; width: 80%; }
    </style>
</head>
<body>
    <div id="message">Memproses...</div>
    <div id="reader"></div>
    <script>
        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 15, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };

        html5QrCode.start(
            { facingMode: "environment" }, 
            config,
            (decodedText) => {
                // Tampilan Kamera disembunyikan agar user tahu scan berhasil
                document.getElementById('reader').style.display = 'none';
                const msgEl = document.getElementById('message');
                msgEl.style.display = 'block';
                msgEl.innerText = "QR Terbaca! Sedang memuat form...";

                // Kirim hasil scan ke Apps Script
                if (window.opener) {
                    window.opener.postMessage({
                        type: "QR_SCANNED",
                        data: decodedText
                    }, "*");
                } else {
                    msgEl.innerText = "Error: Buka scanner dari Dashboard utama.";
                }
            },
            (error) => { /* Proses scanning */ }
        ).catch((err) => {
            alert("Gagal mengakses kamera.");
        });

        // MENDENGARKAN BALASAN DARI APPS SCRIPT
        window.addEventListener('message', function(event) {
            if (event.data.type === 'REDIRECT') {
                // JENDELA INI LANGSUNG BERUBAH MENJADI GOOGLE FORMS!
                window.location.replace(event.data.url);
            } else if (event.data.type === 'ERROR') {
                document.getElementById('message').innerText = "Gagal: " + event.data.msg;
                // Tutup sendiri kalau gagal
                setTimeout(() => window.close(), 3000); 
            }
        });
    </script>
</body>
</html>
