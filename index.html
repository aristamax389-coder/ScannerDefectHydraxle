<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background: #111; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; }
        
        /* HAPUS object-fit: cover! Ini akan membiarkan video tampil apa adanya (mungkin ada sisi hitam di atas/bawah), TAPI DIJAMIN 100% akurat pembacaannya di semua browser */
        #reader { width: 100%; max-width: 500px; margin: 0 auto; position: relative; }
        
        #message { position: absolute; z-index: 999; display: none; background: rgba(0,0,0,0.9); color: #00ff00; padding: 20px; border-radius: 10px; font-size: 16px; font-weight: bold; width: 85%; text-align: center; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 20px rgba(0,255,0,0.4); }
    </style>
</head>
<body>
    <div id="message">Memproses...</div>
    <div id="reader"></div>
    
    <script>
        const html5QrCode = new Html5Qrcode("reader");
        let isScanned = false; 

        // KUNCI UTAMA: qrbox dibuat DINAMIS agar otomatis pas di layar PC maupun HP apapun
        const config = {
            fps: 10,
            qrbox: function(viewfinderWidth, viewfinderHeight) {
                let minEdgeSize = Math.min(viewfinderWidth, viewfinderHeight);
                // Buat kotak fokus sebesar 75% dari ukuran layar
                let size = Math.floor(minEdgeSize * 0.75); 
                return { width: size, height: size };
            }
        };

        const jalankanScanner = (modeKamera) => {
            html5QrCode.start(
                modeKamera, 
                config,
                (decodedText) => {
                    if (isScanned) return; 
                    isScanned = true;

                    const msgEl = document.getElementById('message');
                    msgEl.style.display = 'block';
                    msgEl.innerText = "✅ BERHASIL TERSCAN!\nMenutup kamera...";

                    // Kirim Data ke Dashboard
                    try {
                        if (window.opener) {
                            window.opener.postMessage({ type: "QR_SCANNED", data: decodedText }, "*");
                        }
                    } catch (e) {
                        console.error("Gagal kirim data", e);
                    }

                    // Jeda waktu yang terbukti manjur untuk iPhone
                    setTimeout(() => {
                        html5QrCode.stop().then(() => {
                            window.close(); 
                        }).catch(err => console.log(err));
                    }, 600);
                },
                (error) => {
                    // Dikosongkan agar PC dan Browser Bawaan Android tidak Lag/Error
                }
            ).then(() => {
                // HACK KHUSUS iPHONE: Dipasang 1x saja setelah kamera menyala
                const videoEl = document.querySelector("#reader video");
                if (videoEl) {
                    videoEl.setAttribute("playsinline", "true");
                    videoEl.setAttribute("webkit-playsinline", "true");
                    videoEl.muted = true;
                }
            }).catch((err) => {
                // FALLBACK PC/LAPTOP: Jika menolak kamera belakang, otomatis ganti ke webcam
                if (modeKamera.facingMode === "environment") {
                    jalankanScanner({ facingMode: "user" });
                } else {
                    alert("Akses kamera ditolak. Pastikan izin kamera aktif di browser Anda.");
                }
            });
        };

        // Mulai prioritas eksekusi dengan Kamera Belakang
        jalankanScanner({ facingMode: "environment" });
    </script>
</body>
</html>
